  id: PullTailInteraction
  name: interaction-pull-tail-name
  delayStartTargetMessage: interaction-action-harmless-delay-pull-tail-target
  delayStartOtherMessage: interaction-action-harmless-delay-pull-tail-other
  delayStartColorMessage: Red
  cooldown: 5
  delay: 0.1
