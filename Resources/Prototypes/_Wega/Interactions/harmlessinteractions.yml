    categories: Tail
  - !type:SpeciesCondition
    invert: true
    specieses:
    - Moth
  - !type:DistanceCondition
    maxRange: 1.2
  effects:
  - !type:StaminaDamageEffect
    amount: 7
  - !type:PlaySoundEffect
    sound:
      path: "/Audio/Effects/thudswoosh.ogg"
