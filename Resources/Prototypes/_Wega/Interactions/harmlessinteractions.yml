- type: interactionAction
  parent: BaseAliveMobAction
  id: SpankInteraction
  name: interaction-spank-name
  cooldown: 2.5
  conditions:
  - !type:DistanceCondition
    maxRange: 1.2
  effects:
  - !type:PlaySoundEffect
    sound:
      collection: Slaps
  - !type:StaminaDamageEffect
    amount: 5
  - !type:PopupMessageEffect
    otherMessage: interaction-action-harmless-spank-other
  - !type:SendMessageEffect
    message: interaction-action-harmless-spank-emote

- type: interactionAction
  parent: BaseAliveMobAction
  id: SlapInteraction
  name: interaction-slap-name
  cooldown: 2.5
  conditions:
  - !type:DistanceCondition
    maxRange: 1.2
  effects:
  - !type:PlaySoundEffect
    sound:
      collection: Slaps
  - !type:StaminaDamageEffect
    amount: 1.5
  - !type:PopupMessageEffect
    otherMessage: interaction-action-harmless-slap-other
  - !type:SendMessageEffect
    message: interaction-action-harmless-slap-emote

- type: interactionAction
  parent: BaseAliveMobAction
  id: KissInteraction
  name: interaction-kiss-name
  cooldown: 2.5
  conditions:
  - !type:DistanceCondition
    maxRange: 1.2
  effects:
  - !type:PlaySoundEffect
    sound:
      collection: Kisses
  - !type:PopupMessageEffect
    targetMessage: interaction-action-harmless-kiss-target
    otherMessage: interaction-action-harmless-kiss-other
  - !type:SendMessageEffect
    message: interaction-action-harmless-kiss-emote
  - !type:SpawnEntitiesEffect
    spawnEntities: [ EffectHearts ]

- type: interactionAction
  id: StandInteraction
  name: interaction-stand-name
  cooldown: 10
  delay: 1
  conditions:
  - !type:MobStateCondition
    state: Alive
  - !type:DistanceCondition
    maxRange: 0.8
  - !type:KnockdownCondition
  effects:
  - !type:StandEffect
  - !type:PlaySoundEffect
    sound:
      path: "/Audio/Effects/thudswoosh.ogg"
  - !type:PopupMessageEffect
    otherMessage: interaction-action-harmless-stand-other
  - !type:SendMessageEffect
    message: interaction-action-harmless-stand-emote

- type: interactionAction
  id: KnockdownInteraction
  name: interaction-knockdown-name
  delayStartUserMessage: interaction-action-delay-knockdown-user
  delayStartTargetMessage: interaction-action-delay-knockdown-target
  delayStartOtherMessage: interaction-action-delay-knockdown-other
  delayStartColorMessage: Red
  cooldown: 20
  delay: 3
  conditions:
  - !type:MobStateCondition
    state: Alive
  - !type:DistanceCondition
    maxRange: 0.8
  - !type:KnockdownCondition
    invert: true
  effects:
  - !type:KnockdownEffect
  - !type:PlaySoundEffect
    sound:
      path: "/Audio/Effects/thudswoosh.ogg"
  - !type:PopupMessageEffect
    otherMessage: interaction-action-knockdown-other
  - !type:SendMessageEffect
    message: interaction-action-knockdown-emote

