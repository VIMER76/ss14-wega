- type: entity
  parent: FlaskBase
  id: DrinkUnholyFlask
  name: old flask
  description: "Covered with a layer of dust."
  components:
  - type: Sprite
    sprite: _Wega/Objects/Consumable/Drinks/unholyflask.rsi
    state: icon
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon"} # lid off
          False: {state: "icon"} # lid on

- type: entity
  parent: DrinkUnholyFlask
  id: DrinkUnholyFlaskFull
  suffix: Full
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Unholywater
          Quantity: 50
