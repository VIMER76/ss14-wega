- type: entity
  parent: BaseItem
  id: BaseHardsuitSelector
  abstract: true
  components:
  - type: Sprite
    state: icon
  - type: Item
    size: Huge
  - type: ItemSelector
  - type: ActivatableUI
    key: enum.ItemSelectorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ItemSelectorUiKey.Key:
        type: ItemSelectorBoundUserInterface

- type: entity
  parent: BaseHardsuitSelector
  id: HardsuitCESelector
  name: CE hardsuit selector
  description: "An obsidian rod that strikes paranormal things."
  suffix: Selector
  components:
  - type: Sprite
    sprite: _Wega/Objects/Misc/HardsuitSelector/advanced.rsi
  - type: ItemSelector
    items:
    - ClothingModularControllerAdvancedPreassembled
    - ClothingOuterHardsuitEngineeringWhite
        

